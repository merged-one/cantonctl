# docker-compose.ci.yml — Local CI that matches GitHub Actions exactly.
#
# Usage:
#   docker compose -f docker-compose.ci.yml run --rm ci required  # required PR gate
#   docker compose -f docker-compose.ci.yml run --rm ci all       # required + experimental
#   docker compose -f docker-compose.ci.yml run --rm ci unit     # unit only
#   docker compose -f docker-compose.ci.yml run --rm ci generated-specs
#   docker compose -f docker-compose.ci.yml run --rm ci e2e-sdk  # SDK E2E
#   docker compose -f docker-compose.ci.yml run --rm ci e2e-stable-public
#   docker compose -f docker-compose.ci.yml run --rm ci e2e-sandbox
#   docker compose -f docker-compose.ci.yml run --rm ci e2e-experimental
#   docker compose -f docker-compose.ci.yml run --rm ci shell    # debug shell
#
#   # Test against a specific Node version (CI tests 18, 20, 22):
#   NODE_VERSION=18 docker compose -f docker-compose.ci.yml build ci
#   docker compose -f docker-compose.ci.yml run --rm ci unit

services:
  ci:
    build:
      context: .
      dockerfile: Dockerfile.ci
      args:
        NODE_VERSION: ${NODE_VERSION:-22}
        JAVA_VERSION: 21
        DAML_SDK_VERSION: 3.4.11
    tmpfs:
      # Sandbox writes temp files — tmpfs avoids slow overlay writes
      - /tmp:exec,size=2G
    environment:
      # `dev --full` writes bind-mounted topology files here so the host Docker
      # daemon sees a real host path even when the tests run inside this CI
      # container with the host Docker socket mounted through.
      CANTONCTL_E2E_DOCKER_HOST: host.docker.internal
      CANTONCTL_E2E_TMPDIR: ${HOST_E2E_TMPDIR}
    extra_hosts:
      - host.docker.internal:host-gateway
    volumes:
      - ${HOST_E2E_TMPDIR}:${HOST_E2E_TMPDIR}
      - /var/run/docker.sock:/var/run/docker.sock
