<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120" fill="none">
  <defs>
    <!-- Gradient inspired by blockchain/network themes -->
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="accentFade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- Terminal prompt icon -->
  <rect x="4" y="20" width="80" height="80" rx="12" fill="url(#accent)"/>
  <!-- > cursor -->
  <path d="M24 48 L44 60 L24 72" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <line x1="48" y1="72" x2="64" y2="72" stroke="white" stroke-width="4" stroke-linecap="round"/>

  <!-- "cantonctl" wordmark -->
  <text x="100" y="72" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', 'Cascadia Code', Menlo, Monaco, Consolas, monospace" font-size="46" font-weight="700" letter-spacing="-1">
    <tspan fill="#1E1E2E">canton</tspan><tspan fill="url(#accent)">ctl</tspan>
  </text>

  <!-- Tagline -->
  <text x="102" y="96" font-family="'Inter', 'SF Pro', -apple-system, system-ui, sans-serif" font-size="14" fill="#64748B" letter-spacing="0.5">
    Infrastructure-grade CLI for Canton Network
  </text>
</svg>
