name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # Run the stable/public release gate before publishing
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - name: Cache Daml SDK
        uses: actions/cache@v4
        with:
          path: ~/.daml
          key: daml-sdk-3.4.11-${{ runner.os }}
      - name: Install Daml SDK
        run: |
          if [ ! -f "$HOME/.daml/bin/daml" ]; then
            curl -sSL https://get.daml.com/ | sh -s 3.4.11
          fi
          echo "$HOME/.daml/bin" >> $GITHUB_PATH
      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npm run test:generated-specs
      - run: npm run test:e2e

  publish:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run build

      # Build playground frontend and bundle into dist/
      - name: Build playground UI
        run: |
          cd playground
          npm ci
          npm run build
          mkdir -p ../dist/playground
          cp -r dist/* ../dist/playground/

      # Verify the version in package.json matches the tag
      - name: Verify version matches tag
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          TAG="${GITHUB_REF#refs/tags/}"
          if [ "$PKG_VERSION" != "$TAG" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match tag ($TAG)"
            exit 1
          fi

      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Create a GitHub Release from the tag
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NOTES_FILE="docs/release-notes/${{ github.ref_name }}-splice-support.md"
          if [ -f "$NOTES_FILE" ]; then
            gh release create "${{ github.ref_name }}" --notes-file "$NOTES_FILE"
          else
            gh release create "${{ github.ref_name }}" --generate-notes
          fi
