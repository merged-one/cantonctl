name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  ci-manifest:
    runs-on: ubuntu-latest
    outputs:
      canton-image: ${{ steps.manifest.outputs.cantonImage }}
      daml-sdk-version: ${{ steps.manifest.outputs.damlSdkVersion }}
      java-version: ${{ steps.manifest.outputs.javaVersion }}
      release-suites: ${{ steps.manifest.outputs.releaseSuites }}
      unit-node-versions: ${{ steps.manifest.outputs.unitNodeVersions }}
    steps:
      - uses: actions/checkout@v4
      - id: manifest
        run: node scripts/ci/github-manifest.js

  unit-tests:
    needs: ci-manifest
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ${{ fromJSON(needs.ci-manifest.outputs.unit-node-versions) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: node scripts/ci/run.js suite unit

  release-suites:
    needs: ci-manifest
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        suite: ${{ fromJSON(needs.ci-manifest.outputs.release-suites) }}
    name: release-suite (${{ matrix.suite.label }})
    timeout-minutes: ${{ matrix.suite.timeoutMinutes }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-java@v4
        if: ${{ matrix.suite.needsJava }}
        with:
          distribution: temurin
          java-version: ${{ needs.ci-manifest.outputs.java-version }}
      - name: Cache Daml SDK
        if: ${{ matrix.suite.needsDaml }}
        uses: actions/cache@v4
        with:
          path: ~/.daml
          key: daml-sdk-${{ needs.ci-manifest.outputs.daml-sdk-version }}-${{ runner.os }}
      - name: Install Daml SDK
        if: ${{ matrix.suite.needsDaml }}
        run: |
          if [ ! -f "$HOME/.daml/bin/daml" ]; then
            curl -sSL https://get.daml.com/ | sh -s ${{ needs.ci-manifest.outputs.daml-sdk-version }}
          fi
          echo "$HOME/.daml/bin" >> "$GITHUB_PATH"
      - name: Cache Canton Docker image
        if: ${{ matrix.suite.needsDocker }}
        uses: actions/cache@v4
        with:
          path: /tmp/docker-images
          key: docker-canton-${{ needs.ci-manifest.outputs.canton-image }}-${{ runner.os }}
      - name: Load or pull Canton Docker image
        if: ${{ matrix.suite.needsDocker }}
        run: |
          if [ -f /tmp/docker-images/canton.tar ]; then
            docker load < /tmp/docker-images/canton.tar
          else
            docker pull ${{ needs.ci-manifest.outputs.canton-image }}
            mkdir -p /tmp/docker-images
            docker save ${{ needs.ci-manifest.outputs.canton-image }} > /tmp/docker-images/canton.tar
          fi
      - run: npm ci
      - run: npm run build
      - name: Run suite
        env:
          JAVA_OPTS: -Xms512M -Xmx2G -XX:+UseSerialGC
        run: node scripts/ci/run.js suite ${{ matrix.suite.id }}

  release-gate:
    needs: [unit-tests, release-suites]
    runs-on: ubuntu-latest
    steps:
      - name: Verify release gate passed
        run: |
          echo "unit-tests: ${{ needs.unit-tests.result }}"
          echo "release-suites: ${{ needs.release-suites.result }}"
          if [[ "${{ needs.unit-tests.result }}" != "success" ]]; then
            echo "::error::unit-tests failed"
            exit 1
          fi
          if [[ "${{ needs.release-suites.result }}" != "success" ]]; then
            echo "::error::release-suites failed"
            exit 1
          fi
          echo "Release gate passed"

  publish:
    needs: release-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run build

      - name: Build playground UI
        run: |
          if [ ! -d playground ]; then
            echo "No playground workspace present; skipping UI bundle."
            exit 0
          fi
          cd playground
          npm ci
          npm run build
          mkdir -p ../dist/playground
          cp -r dist/* ../dist/playground/

      - name: Verify version matches tag
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          TAG="${GITHUB_REF#refs/tags/}"
          if [ "$PKG_VERSION" != "$TAG" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match tag ($TAG)"
            exit 1
          fi

      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NOTES_FILE="docs/release-notes/${{ github.ref_name }}-splice-support.md"
          if [ -f "$NOTES_FILE" ]; then
            gh release create "${{ github.ref_name }}" --notes-file "$NOTES_FILE"
          else
            gh release create "${{ github.ref_name }}" --generate-notes
          fi
