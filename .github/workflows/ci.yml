name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci-manifest:
    runs-on: ubuntu-latest
    outputs:
      canton-image: ${{ steps.manifest.outputs.cantonImage }}
      daml-sdk-version: ${{ steps.manifest.outputs.damlSdkVersion }}
      java-version: ${{ steps.manifest.outputs.javaVersion }}
      main-extra-suites: ${{ steps.manifest.outputs.mainExtraSuites }}
      pr-suites: ${{ steps.manifest.outputs.prSuites }}
      unit-node-versions: ${{ steps.manifest.outputs.unitNodeVersions }}
    steps:
      - uses: actions/checkout@v4
      - id: manifest
        run: node scripts/ci/github-manifest.js

  unit-tests:
    needs: ci-manifest
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ${{ fromJSON(needs.ci-manifest.outputs.unit-node-versions) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: node scripts/ci/run.js suite unit

  required-suites:
    needs: ci-manifest
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        suite: ${{ fromJSON(needs.ci-manifest.outputs.pr-suites) }}
    name: suite (${{ matrix.suite.label }})
    timeout-minutes: ${{ matrix.suite.timeoutMinutes }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-java@v4
        if: ${{ matrix.suite.needsJava }}
        with:
          distribution: temurin
          java-version: ${{ needs.ci-manifest.outputs.java-version }}
      - name: Cache Daml SDK
        if: ${{ matrix.suite.needsDaml }}
        uses: actions/cache@v4
        with:
          path: ~/.daml
          key: daml-sdk-${{ needs.ci-manifest.outputs.daml-sdk-version }}-${{ runner.os }}
      - name: Install Daml SDK
        if: ${{ matrix.suite.needsDaml }}
        run: |
          if [ ! -f "$HOME/.daml/bin/daml" ]; then
            curl -sSL https://get.daml.com/ | sh -s ${{ needs.ci-manifest.outputs.daml-sdk-version }}
          fi
          echo "$HOME/.daml/bin" >> "$GITHUB_PATH"
      - name: Cache Canton Docker image
        if: ${{ matrix.suite.needsDocker }}
        uses: actions/cache@v4
        with:
          path: /tmp/docker-images
          key: docker-canton-${{ needs.ci-manifest.outputs.canton-image }}-${{ runner.os }}
      - name: Load or pull Canton Docker image
        if: ${{ matrix.suite.needsDocker }}
        run: |
          if [ -f /tmp/docker-images/canton.tar ]; then
            docker load < /tmp/docker-images/canton.tar
          else
            docker pull ${{ needs.ci-manifest.outputs.canton-image }}
            mkdir -p /tmp/docker-images
            docker save ${{ needs.ci-manifest.outputs.canton-image }} > /tmp/docker-images/canton.tar
          fi
      - run: npm ci
      - run: npm run build
      - name: Run suite
        env:
          JAVA_OPTS: -Xms512M -Xmx2G -XX:+UseSerialGC
        run: node scripts/ci/run.js suite ${{ matrix.suite.id }}
      - name: Upload suite artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.suite.id }}-failure-logs
          path: |
            /tmp/cantonctl-e2e-*/
            /tmp/cantonctl-e2e-dev-full-*/
          retention-days: 7

  main-extra-suites:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: ci-manifest
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        suite: ${{ fromJSON(needs.ci-manifest.outputs.main-extra-suites) }}
    name: extra-suite (${{ matrix.suite.label }})
    timeout-minutes: ${{ matrix.suite.timeoutMinutes }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-java@v4
        if: ${{ matrix.suite.needsJava }}
        with:
          distribution: temurin
          java-version: ${{ needs.ci-manifest.outputs.java-version }}
      - name: Cache Daml SDK
        if: ${{ matrix.suite.needsDaml }}
        uses: actions/cache@v4
        with:
          path: ~/.daml
          key: daml-sdk-${{ needs.ci-manifest.outputs.daml-sdk-version }}-${{ runner.os }}
      - name: Install Daml SDK
        if: ${{ matrix.suite.needsDaml }}
        run: |
          if [ ! -f "$HOME/.daml/bin/daml" ]; then
            curl -sSL https://get.daml.com/ | sh -s ${{ needs.ci-manifest.outputs.daml-sdk-version }}
          fi
          echo "$HOME/.daml/bin" >> "$GITHUB_PATH"
      - run: npm ci
      - run: npm run build
      - name: Run suite
        run: node scripts/ci/run.js suite ${{ matrix.suite.id }}

  all-green:
    if: always()
    needs: [unit-tests, required-suites]
    runs-on: ubuntu-latest
    steps:
      - name: Verify required jobs passed
        run: |
          echo "unit-tests: ${{ needs.unit-tests.result }}"
          echo "required-suites: ${{ needs.required-suites.result }}"
          if [[ "${{ needs.unit-tests.result }}" != "success" ]]; then
            echo "::error::unit-tests failed"
            exit 1
          fi
          if [[ "${{ needs.required-suites.result }}" != "success" ]]; then
            echo "::error::required-suites failed"
            exit 1
          fi
          echo "All required checks passed"
